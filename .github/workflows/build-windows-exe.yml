name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

# Default: read-only for all tokens
permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Job 1: run tests on Windows before building
  # -----------------------------------------------------------------------
  windows-tests:
    name: Tests (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (offline, no AI key required)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q tests

  # -----------------------------------------------------------------------
  # Job 2: build the portable EXE (only if tests pass)
  # -----------------------------------------------------------------------
  build-windows-exe:
    name: Build EXE (Windows)
    runs-on: windows-latest
    needs: windows-tests
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies + PyInstaller
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller spec
        run: pyinstaller --noconfirm build/AskTrainMind.spec

      - name: Verify EXE was created
        run: |
          if (-not (Test-Path "dist/AskTrainMind.exe")) {
            Write-Error "dist/AskTrainMind.exe not found — build failed!"
            exit 1
          }
          Write-Host "Build OK: dist/AskTrainMind.exe ($((Get-Item dist/AskTrainMind.exe).Length) bytes)"
        shell: pwsh

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AskTrainMind-windows
          path: dist/AskTrainMind.exe
          retention-days: 30

      # Attach the EXE to the GitHub Release when triggered by a tag push or release event
      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AskTrainMind.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
